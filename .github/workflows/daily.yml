name: Daily MAUI Job Hunter

on:
  schedule:
    - cron: "0 13 * 3 *"  # 8 AM Nigeria time
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install feedparser

      - name: Run bot
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python bot.py
